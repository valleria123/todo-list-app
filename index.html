<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Todo App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 420px;
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
      font-size: 38px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      background: #2563eb;
    }

    .app {
      display: none;
    }

    ul {
      list-style: none;
      margin-top: 15px;
      text-align: left;
    }

    li {
      background: #334155;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: #ef4444;
      width: auto;
      padding: 6px 10px;
      margin: 0;
      font-size: 13px;
    }

    .done {
      text-decoration: line-through;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container login" id="loginBox">
    <h1>TaskFlow</h1>
    <p>Organize your day, track your progress</p>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <button onclick="startApp()">Get Started</button>
  </div>

  <div class="container app" id="appBox">
    <h1>TaskFlow</h1>
    <p id="welcomeText"></p>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>
  </div>

  <script>
    function startApp() {
      let name = document.getElementById("nameInput").value;

      if (name.trim() === "") {
        alert("Please enter your name");
        return;
      }

      document.getElementById("loginBox").style.display = "none";
      document.getElementById("appBox").style.display = "block";
      document.getElementById("welcomeText").innerText = "Welcome, " + name + "!";
    }

    function addTask() {
      let taskInput = document.getElementById("taskInput");
      let taskText = taskInput.value;

      if (taskText.trim() === "") {
        alert("Please enter a task");
        return;
      }

      let li = document.createElement("li");

      let span = document.createElement("span");
      span.innerText = taskText;
      span.onclick = function () {
        span.classList.toggle("done");
      };

      let deleteBtn = document.createElement("button");
      deleteBtn.innerText = "Delete";
      deleteBtn.className = "delete";
      deleteBtn.onclick = function () {
        li.remove();
      };

      li.appendChild(span);
      li.appendChild(deleteBtn);

      document.getElementById("taskList").appendChild(li);
      taskInput.value = "";
    }
  </script>

</body>
</html>
